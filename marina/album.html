    <style>
        body {
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            margin: 0;

        }

        .myNav {
            background-color: #6fa7ec;
            color: white;
        }

        .myDiv {
            background-color: rgba(199, 199, 199, 0.8);
            margin: 50px auto;
            padding: 20px;
            border-radius: 15px;
            max-width: 900px;
            text-align: center;
        }

        .album{
            margin: 0 3rem;  
            column-count: 4;
            column-gap: 10px;
        }

        .album img {
            width: 100%;
            margin-bottom: 10px;
            border-radius: 10px;
            display: block;
        }

        .botao {
            display: block;
            width: fit-content;
            margin: 20px auto;
            border-style: none;
            border-radius: 10px;
            background-color: #cfc05f;
            color: rgb(29, 32, 96);
            padding: 5px 5px;
            cursor: pointer;
        }
        
        @media screen and (max-width: 768px) {
            body {
                background-image: url(imagens/fundomenor.jpeg);
                background-size: cover;
                background-repeat: no-repeat;
                background-attachment: fixed;
            }
            .album {
                column-count: 1;
            }
        }

        @media screen and (min-width: 768px) {
            body {
                background-image: url(imagens/fundomaior.png);
                background-size: cover;
                background-repeat: no-repeat;
