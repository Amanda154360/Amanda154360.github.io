<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style type="text/css">
        body {
        margin: 0;
        background-image: url('imagens/fundoPaisagem.png');
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
      }

      @media (max-width: 768px) {
        body {
          background-image: url('imagens/fundo.jpg');
        }
        .gallery {
        column-count: 1 !important;
        }
        .videos-row {
        flex: 1 1 100%;
        }
       }

      @media(max-width: 992px) {
        .gallery {
        column-count: 3;
        }
      }

      .myBg{
        background-color: #0B1E3F;
      }

      .myBgbranco{
        background-color: #f4eada;
      }

      .myletras{
      color: #C9A14D;
      font-family: 'Courier New', Courier, monospace;
      }

      .mylink{
        color: #c9b68d;
      }
      .mylink:hover{
      color: #C9A14D;
      font-weight: bold;
      }

      .gallery {
      margin: 0 3rem;  
      column-count: 4;
      column-gap: 10px;
      }

      .gallery img {
      width: 100%;
      margin-bottom: 10px;
      border-radius: 10px;
      display: block;
      }

      .videos-row {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
      width: 100%; 
      }

      .videos-row video {
      flex: 1 1 calc(33.33% - 15px);
      border-radius: 10px;
      width: 100%;
      aspect-ratio: 16 / 9;
      }
      
      video {
        width: 100%;
        height: auto;
        aspect-ratio: 16 / 9;
        display: block;
      }

    </style>
</head>

    <nav class="myletras p-2 rounded-3 ">
